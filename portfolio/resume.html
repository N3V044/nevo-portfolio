<script>
/* Particle Network */
(function(){var c=document.getElementById('particle-canvas'),x=c.getContext('2d'),p=[];function r(){c.width=window.innerWidth;c.height=window.innerHeight}r();window.addEventListener('resize',r);function P(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.radius=Math.random()*2+1}P.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>c.width)this.vx*=-1;if(this.y<0||this.y>c.height)this.vy*=-1};P.prototype.draw=function(){x.beginPath();x.arc(this.x,this.y,this.radius,0,Math.PI*2);x.fillStyle='rgba(59,130,246,0.5)';x.fill()};for(var i=0;i<80;i++)p.push(new P());function a(){x.clearRect(0,0,c.width,c.height);p.forEach(function(q){q.update();q.draw()});for(var i=0;i<p.length;i++)for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){x.beginPath();x.moveTo(p[i].x,p[i].y);x.lineTo(p[j].x,p[j].y);x.strokeStyle='rgba(59,130,246,'+(1-d/150)*0.15+')';x.lineWidth=0.5;x.stroke()}}requestAnimationFrame(a)}a()})();
/* Cursor Glow */
document.addEventListener('mousemove',function(e){var g=document.getElementById('cursorGlow');g.style.left=e.clientX+'px';g.style.top=e.clientY+'px'});
/* Scroll Fade */
(function(){var o=new IntersectionObserver(function(e){e.forEach(function(en){if(en.isIntersecting)en.target.classList.add('visible')})},{threshold:0.1});document.querySelectorAll('.fade-in').forEach(function(el){o.observe(el)})})();
</script>

<script>
document.querySelectorAll('.nav-links a').forEach(function(link) {
  link.addEventListener('click', function(e) {
    var href = this.getAttribute('href');
    if (href && !href.startsWith('#') && !href.startsWith('mailto')) {
      e.preventDefault();
      document.body.style.transition = 'opacity 0.3s ease';
      document.body.style.opacity = '0';
      setTimeout(function() { window.location.href = href; }, 300);
    }
  });
});
</script>

<script>
window.addEventListener('load', function() {
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var active = document.querySelector('.nav-links a.active');
      var navLinks = document.getElementById('navLinks');
      if (active && navLinks) {
        var activeRect = active.getBoundingClientRect();
        var navRect = navLinks.getBoundingClientRect();
        var offset = activeRect.left - navRect.left - (navRect.width / 2) + (activeRect.width / 2);
        navLinks.scrollLeft = Math.max(0, navLinks.scrollLeft + offset);
      }
    });
  });
});
</script>

<script>
(function() {
  var navbar = document.querySelector('.navbar');
  var lastScrollY = window.scrollY;
  var ticking = false;

  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        var currentScrollY = window.scrollY;
        if (currentScrollY <= 10) {
          navbar.style.transform = 'translateY(0)';
        } else if (currentScrollY < lastScrollY) {
          navbar.style.transform = 'translateY(0)';
        } else {
          navbar.style.transform = 'translateY(-100%)';
        }
        lastScrollY = currentScrollY;
        ticking = false;
      });
      ticking = true;
    }
  });
})();
</script>
