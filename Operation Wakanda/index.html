<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Wakanda</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070c;--bg2:#0c0c14;--bg3:#12121c;--sf:#181824;--sf2:#1e1e2e;
--gd:#c9a84c;--gd2:#b8952f;--gbg:rgba(201,168,76,.05);--gb:rgba(201,168,76,.18);--gg:rgba(201,168,76,.1);
--rd:#e05060;--gn:#4ecb71;--am:#e8a838;
--iv:#f0ead6;--i2:#cfc8b2;--i3:#a8a290;--i4:#7a7568;--i5:#504c42;
--bd:#262638;
--f:'Plus Jakarta Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--iv);font-family:var(--f);-webkit-font-smoothing:antialiased;overflow-x:hidden;font-size:13px}
::selection{background:var(--gd);color:var(--bg)}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(201,168,76,.008) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}

/* PROGRESS */
.pb{position:fixed;top:0;left:0;right:0;height:3px;z-index:200;background:rgba(38,38,56,.4)}
.pf{height:100%;background:linear-gradient(90deg,var(--gd2),var(--gd));transition:width .6s;box-shadow:0 0 8px var(--gg)}

/* MINIMAP */
.mm{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:201;display:none;align-items:center;gap:3px;background:rgba(7,7,12,.88);backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:16px;padding:4px 10px}
.mm.on{display:flex}
.mm .n{width:8px;height:8px;border-radius:50%;background:var(--bd);transition:.3s;position:relative}
.mm .n.dn{background:var(--gn)}
.mm .n.ac{background:var(--gd);box-shadow:0 0 6px var(--gg)}
.mm .n.dd{background:var(--rd)}
.mm .n.lk{opacity:.2}
.mm .ln{width:8px;height:1px;background:var(--bd)}
.mm .n::after{content:attr(data-tip);position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:var(--m);font-size:.4rem;color:var(--i4);white-space:nowrap;opacity:0;transition:.15s;pointer-events:none}
.mm .n:hover::after{opacity:1}
@media(max-width:600px){.mm{padding:3px 7px;gap:2px}.mm .n{width:6px;height:6px}.mm .ln{width:5px}}

/* OBJECTIVES */
.obj{position:fixed;top:8px;right:8px;z-index:201;display:none;background:rgba(7,7,12,.9);backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:10px;padding:8px 12px;max-width:180px}
.obj.on{display:block}
.obj-t{font-family:var(--m);font-size:.44rem;color:var(--gd);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-weight:600}
.obj-i{display:flex;align-items:center;gap:5px;font-size:.52rem;color:var(--i4);padding:2px 0}
.obj-i.dn{color:var(--gn)}
.obj-i .ck{width:10px;height:10px;border-radius:3px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.4rem;flex-shrink:0}
.obj-i.dn .ck{border-color:var(--gn);color:var(--gn);background:rgba(78,203,113,.1)}
@media(max-width:600px){.obj{max-width:150px;padding:6px 9px;top:6px;right:6px}.obj-i{font-size:.46rem}}

/* INTEL BAR */
.ib{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(7,7,12,.93);backdrop-filter:blur(10px);border-top:1px solid var(--bd);padding:5px 12px;display:flex;align-items:center;gap:8px;font-family:var(--m);font-size:.5rem;color:var(--i4);transform:translateY(100%);transition:transform .4s}
.ib.on{transform:translateY(0)}
.ib .g{color:var(--gd);font-weight:600}
.ib .s{width:1px;height:10px;background:var(--bd)}
.ib .v{color:var(--i2)}
.ib .t{margin-left:auto}
.ib-b{font-family:var(--m);font-size:.46rem;font-weight:600;padding:3px 8px;border-radius:3px;border:1px solid var(--bd);background:var(--sf);color:var(--i4);cursor:pointer;transition:.12s;white-space:nowrap}
.ib-b:hover{border-color:var(--gb);color:var(--gd)}
.ib-b.rs{border-color:rgba(224,80,96,.12);color:rgba(224,80,96,.5)}
.ib-b.rs:hover{color:var(--rd)}
@media(max-width:600px){.ib{font-size:.44rem;gap:5px;padding:4px 8px}.ib-b{font-size:.4rem;padding:2px 6px}}

/* STORY */
#story{position:relative;z-index:1;padding-bottom:44px}
.bk{opacity:0;transform:translateY(18px);transition:opacity .5s,transform .5s}
.bk.v{opacity:1;transform:none}
.bk.d{opacity:.08;pointer-events:none;filter:blur(2px);transition:.5s;max-height:80px;overflow:hidden}
.bk.v{opacity:1;transform:none;padding-top:10vh}
.dv{width:1px;height:28px;background:linear-gradient(transparent,var(--gb),transparent);margin:0 auto}

/* SCAN TRANSITION */
.scan{text-align:center;padding:32px 16px}
.scan-bar{width:120px;height:2px;background:var(--bd);border-radius:1px;margin:0 auto 8px;overflow:hidden}
.scan-fill{height:100%;background:var(--gd);width:0;animation:scanFill 1s ease forwards}
@keyframes scanFill{to{width:100%}}
.scan-t{font-family:var(--m);font-size:.48rem;color:var(--gd);letter-spacing:1px;animation:glitch .1s ease .5s 3}
@keyframes glitch{0%{transform:translateX(-2px)}50%{transform:translateX(2px)}100%{transform:none}}

/* CINEMATIC */
.cn{min-height:24vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 16px}
.cn-c{font-family:var(--m);font-size:.46rem;color:var(--gd);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;opacity:0;animation:fi .4s .15s forwards}
.cn-t{font-size:clamp(1rem,3vw,1.5rem);font-weight:800;letter-spacing:-.3px;background:linear-gradient(135deg,var(--iv),var(--gd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fi .4s .4s forwards}
@keyframes fi{to{opacity:1}}

/* HERO */
.hr{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
.hr-g{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.hr-g svg{width:min(300px,70vw);opacity:.03;animation:sp 100s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.hr-w{position:absolute;top:25%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(201,168,76,.04),transparent 70%);pointer-events:none}
.hr-c{position:relative;z-index:1;padding:16px;max-width:600px}
.hb{display:inline-flex;align-items:center;gap:5px;background:var(--gbg);border:1px solid var(--gb);border-radius:16px;padding:3px 11px;margin-bottom:16px;font-size:.5rem;font-weight:600;color:var(--gd);letter-spacing:1px;text-transform:uppercase}
.hb .dt{width:4px;height:4px;background:var(--gd);border-radius:50%;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.ht{font-size:clamp(1.8rem,5vw,3.4rem);font-weight:800;letter-spacing:-1px;line-height:1.05;margin-bottom:6px;background:linear-gradient(135deg,var(--iv) 30%,var(--gd));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hss{font-size:.82rem;color:var(--i3);max-width:480px;margin:0 auto 20px;line-height:1.45}
.bg{font-family:var(--f);font-size:.72rem;font-weight:700;color:var(--bg);background:linear-gradient(135deg,var(--gd),var(--gd2));border:none;padding:10px 28px;border-radius:7px;cursor:pointer;letter-spacing:.4px;text-transform:uppercase;transition:.2s;box-shadow:0 3px 14px rgba(201,168,76,.18)}
.bg:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(201,168,76,.25)}

/* ROLES */
.rs{max-width:680px;margin:0 auto;padding:0 20px;text-align:center}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
@media(max-width:520px){.rg{grid-template-columns:1fr;max-width:260px;margin:20px auto 0}}
.rc{background:var(--sf);border:2px solid var(--bd);border-radius:10px;cursor:pointer;transition:.3s;overflow:hidden;text-align:center}
.rc:hover{border-color:var(--gb);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.35)}
.rc:hover .ra svg{transform:scale(1.05)}
.ra{width:100%;height:180px;background:linear-gradient(180deg,#16121e,var(--sf));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
@media(max-width:520px){.ra{height:120px}}
.ra svg{width:110px;height:110px;transition:transform .3s;filter:drop-shadow(0 2px 6px rgba(201,168,76,.08))}
@media(max-width:520px){.ra svg{width:75px;height:75px}}
.ra::after{content:'';position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(transparent,var(--sf))}
.rb{padding:12px 14px 16px}
.rc .rn{font-size:.88rem;font-weight:800;color:var(--iv)}
.rc .rr{font-size:.48rem;font-weight:600;color:var(--gd);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
.rc .rl{list-style:none;text-align:left}
.rc .rl li{font-size:.6rem;color:var(--i3);padding:2px 0;display:flex;gap:5px;align-items:center}
.rc .rl li::before{content:'';width:3px;height:3px;background:var(--gd);border-radius:1px;flex-shrink:0}

/* DIALOGUE */
.dl{display:flex;gap:8px;margin:8px 0;align-items:flex-start}
.da{width:34px;height:34px;border-radius:50%;background:var(--sf2);border:1.5px solid var(--gb);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.da svg{width:22px;height:22px}
.db{background:var(--sf);border:1px solid var(--bd);border-radius:2px 10px 10px 10px;padding:10px 14px;flex:1;font-size:.76rem;color:var(--i2);line-height:1.5}
.db strong{color:var(--iv);font-weight:600}
.db .cur{display:inline-block;width:1.5px;height:.8em;background:var(--gd);margin-left:1px;animation:bl .5s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
@media(max-width:600px){.da{width:24px;height:24px}.da svg{width:14px;height:14px}.db{padding:6px 9px;font-size:.64rem}}

.cw{max-width:720px;margin:0 auto;padding:0 20px}

/* BOXES */
.nb{border-radius:8px;padding:10px 12px;margin:6px 0;font-size:.64rem;line-height:1.45}
.nb.i{background:var(--gbg);border:1px solid var(--gb);color:var(--i3)}
.nb.w{background:rgba(139,38,53,.05);border:1px solid rgba(139,38,53,.16);color:var(--i3)}
.nb.o{background:rgba(78,203,113,.03);border:1px solid rgba(78,203,113,.12);color:var(--i3)}
.nb.x{background:rgba(255,255,255,.01);border:1px solid var(--bd);color:var(--i5);opacity:.5}
.nb b{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px}
.nb.i b{color:var(--gd)}.nb.w b{color:var(--rd)}.nb.o b{color:var(--gn)}.nb.x b{color:var(--i5)}

/* TERM */
.tt{background:#05050a;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin:6px 0}
.tt-h{padding:4px 8px;background:var(--bg3);border-bottom:1px solid var(--bd);display:flex;gap:3px}
.td{width:5px;height:5px;border-radius:50%}.td.r{background:#e05060}.td.y{background:#e8a838}.td.g{background:#4ecb71}
.tt-b{padding:8px 10px;font-family:var(--m);font-size:.56rem;line-height:1.65;color:var(--i4);white-space:pre-wrap;overflow-x:auto}
.tt-b .c{color:var(--gn)}.tt-b .o{color:var(--i5)}.tt-b .h{color:var(--gd)}
.tm-cur{display:inline-block;width:4px;height:.9em;background:var(--gn);animation:bl .4s infinite;vertical-align:middle}
@media(max-width:600px){.tt-b{font-size:.5rem;padding:6px 8px}}

/* CHOICES */
.cs{display:flex;flex-direction:column;gap:5px;margin:14px 0}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px}
.cc:hover{border-color:var(--gb);background:var(--sf2);transform:translateX(4px)}
.cc.r{border-color:var(--gb);background:var(--gbg)}
.cc .a{width:18px;height:18px;border-radius:4px;background:var(--gbg);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gd);font-size:.45rem;transition:.15s}
.cc:hover .a{transform:translateX(2px)}
.cc .l{font-size:.7rem;font-weight:700;color:var(--iv)}
.cc .de{font-size:.56rem;color:var(--i4)}
.tg{display:inline-block;font-family:var(--m);font-size:.42rem;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.tg.r{color:var(--gd);background:var(--gbg);border:1px solid var(--gb)}
.tg.w{color:var(--am);background:rgba(232,168,56,.03);border:1px solid rgba(232,168,56,.1)}
.tg.s{color:var(--gn);background:rgba(78,203,113,.03);border:1px solid rgba(78,203,113,.1)}

/* EVIDENCE */
.ev{background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin:8px 0;position:relative}
.ev-st{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) rotate(-8deg);font-family:var(--m);font-size:.8rem;font-weight:800;color:rgba(201,168,76,.05);letter-spacing:2px;pointer-events:none}
.ev-h{padding:7px 11px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:5px;background:var(--bg3)}
.sv{font-family:var(--m);font-size:.44rem;font-weight:600;padding:1px 5px;border-radius:3px}
.sv.c{color:var(--rd);background:rgba(224,80,96,.05);border:1px solid rgba(224,80,96,.14)}
.sv.m{color:var(--am);background:rgba(232,168,56,.04);border:1px solid rgba(232,168,56,.1)}
.ev-t{font-size:.66rem;font-weight:700;color:var(--iv);flex:1}
.ev-b{padding:8px 11px}
.ev-r{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid var(--bd);font-size:.6rem}
.ev-r:last-child{border-bottom:none}
.ev-k{color:var(--i5);flex:0 0 70px;font-size:.5rem;font-weight:600;text-transform:uppercase}
.ev-v{color:var(--i2);line-height:1.35}

/* FINDING */
.fn{background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin:6px 0}
.fn-h{padding:8px 11px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:5px}
.fb{width:3px;height:16px;border-radius:1px}.fb.c{background:var(--rd)}.fb.h{background:#e88040}.fb.m{background:var(--am)}.fb.l{background:var(--gn)}
.fn-t{font-size:.72rem;font-weight:700;color:var(--iv)}
.fn-d{padding:8px 11px;font-size:.6rem;color:var(--i3);line-height:1.4}

.ntf{position:fixed;top:28px;left:50%;transform:translateX(-50%) translateY(-60px);z-index:300;background:var(--sf2);border:1px solid var(--gb);border-radius:8px;padding:7px 16px;font-size:.62rem;font-weight:600;color:var(--gd);box-shadow:0 6px 20px rgba(0,0,0,.5);transition:transform .3s}
.ntf.on{transform:translateX(-50%) translateY(0)}
.ntf.rd{border-color:rgba(224,80,96,.18);color:var(--rd)}
@keyframes shk{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shk{animation:shk .3s}

.ptc-w{position:fixed;inset:0;pointer-events:none;z-index:250}
.ptc{position:absolute;width:3px;height:3px;background:var(--gd);border-radius:50%;animation:ptcF .7s ease-out forwards}
@keyframes ptcF{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}}

.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:12px 0}
@media(max-width:480px){.sg{grid-template-columns:1fr}}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center}
.sc-n{font-family:var(--m);font-size:1rem;font-weight:700;color:var(--gd)}
.sc-l{font-size:.46rem;color:var(--i4);margin-top:1px}
.ft{text-align:center;padding:24px 14px;border-top:1px solid var(--bd)}
.ft p{font-size:.52rem;color:var(--i5);line-height:1.5}
.ft a{color:var(--gd);text-decoration:none}
</style>
</head>
<body>
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
<div class="mm" id="mm"></div>
<div class="obj" id="obj"><div class="obj-t">Objectives</div><div id="objList"></div></div>
<div class="ib" id="ib"><span class="g" id="iR">-</span><span class="s"></span><span>Intel:<span class="v" id="iE">0</span></span><span class="s"></span><span>Ch:<span class="v" id="iC">0</span></span><span class="s"></span><span>Dead:<span class="v" id="iD">0</span></span><span class="t" id="iT">00:00</span><span class="s"></span><button class="ib-b" onclick="goBack()">&#9664;</button><button class="ib-b rs" onclick="location.reload()">&#8635;</button></div>
<div class="ntf" id="ntf"></div>
<div class="ptc-w" id="ptcW"></div>
<div id="story"></div>
<script>
var S={r:null,st:[],ev:0,dd:0,ch:0,t0:null,ti:null,hist:[],obj:[0,0,0,0,0]},EL=document.getElementById('story');

// T'Challa: MALE - angular mask, pointed ears, strong jaw, claw scars, broad armored chest
var AP='<svg viewBox="0 0 120 120" fill="none" stroke="#c9a84c" stroke-linecap="round"><defs><linearGradient id="gp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c9a84c" stop-opacity=".15"/><stop offset="100%" stop-color="#c9a84c" stop-opacity=".02"/></linearGradient></defs><circle cx="60" cy="42" r="24" stroke-width="1.5" fill="url(#gp)"/><path d="M60 18v-3" stroke-width="2"/><path d="M43 33l-11-19" stroke-width="2.2"/><path d="M77 33l11-19" stroke-width="2.2"/><path d="M40 40c5-10 11-13 20-13s15 3 20 13" stroke-width="1" fill="none" opacity=".4"/><rect x="47" y="38" width="7" height="2.5" rx="1" fill="#c9a84c" opacity=".8"/><rect x="66" y="38" width="7" height="2.5" rx="1" fill="#c9a84c" opacity=".8"/><path d="M55 50l5 4 5-4" stroke-width="1.5"/><path d="M48 28l24 0" stroke-width="1" opacity=".25"/><path d="M52 32l16 0" stroke-width=".6" opacity=".15"/><path d="M34 72c0-15 12-25 26-25s26 10 26 25" stroke-width="2" fill="url(#gp)"/><path d="M47 60l-4 14" stroke-width="1.2" opacity=".5"/><path d="M53 58l-2 16" stroke-width="1.2" opacity=".5"/><path d="M67 58l2 16" stroke-width="1.2" opacity=".5"/><path d="M73 60l4 14" stroke-width="1.2" opacity=".5"/><path d="M46 72h28" stroke-width="1" opacity=".2"/><circle cx="60" cy="68" r="4" stroke-width=".8" fill="none" opacity=".2"/></svg>';
